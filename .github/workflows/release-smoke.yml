name: Release Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  smoke-install:
    name: smoke / ${{ matrix.os }} / ${{ matrix.install_mode }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        install_mode:
          - source
          - zip

    env:
      REPO_ZIP_URL: https://github.com/UnableToUseGit/multimodal-harness/archive/refs/heads/main.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pipx
        run: python -m pip install --upgrade pip pipx

      - name: Install MM Harness from source checkout
        if: matrix.install_mode == 'source'
        run: python -m pipx install .

      - name: Install MM Harness from GitHub zip
        if: matrix.install_mode == 'zip'
        run: python -m pipx install "$REPO_ZIP_URL"

      - name: Resolve pipx bin directory
        run: |
          PIPX_BIN_DIR="$(python -m pipx environment --value PIPX_BIN_DIR)"
          echo "$PIPX_BIN_DIR" >> "$GITHUB_PATH"
          echo "PIPX_BIN_DIR=$PIPX_BIN_DIR" >> "$GITHUB_ENV"

      - name: Run info
        run: |
          "$PIPX_BIN_DIR/mm-harness" info

      - name: Run doctor
        run: |
          "$PIPX_BIN_DIR/mm-harness" doctor || true

      - name: Run create help
        run: |
          "$PIPX_BIN_DIR/mm-harness" create --help
